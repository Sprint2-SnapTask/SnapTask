<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Flashcards IA | SnapTask</title>

    <link rel="stylesheet" href="./flashcards.css">
</head>

<body>

    <button class="back-button-fixed" id="backButton">
        <span class="back-arrow">&lt;</span>
    </button>

    <div class="side-menu" id="sideMenu">

        <div class="side-menu-content">

            <div class="side-menu-title">
                DEV NAV
            </div>
            <a href="./snaptask.html">
                <div class="side-menu-item" data-page="snaptask">
                    <img src="../images/brilho.png" alt="SnapTask" class="menu-icon">
                    <span>SnapTask</span>
                </div>
            </a>

            <a href="./editordoc.html">
                <div class="side-menu-item" data-page="editor-doc">
                    <img src="../images/editor-doc.png" alt="Editor Doc" class="menu-icon">
                    <span>Editor Doc</span>
                </div>
            </a>

            <a href="../pages/leitordecod.html">
                <div class="side-menu-item" data-page="leitor-codigos">
                    <img src="../images/scaner.png" alt="Leitor Códigos" class="menu-icon">
                    <span>Leitor Códigos</span>
                </div>
            </a>

            <a href="../pages/qr.html">
                <div class="side-menu-item">
                    <img src="../images/qr-code.png" class="menu-icon">
                    <span>QR Share</span>
                </div>

                
            </a>

            <a href="../pages/galeria.html">
                <div class="side-menu-item" data-page="galeria">
                    <img src="../images/galeria.png" alt="Galeria" class="menu-icon">
                    <span>Galeria</span>
                </div>
            </a>

            <a href="../pages/flashcards.html">
                <div class="side-menu-item" data-page="flashcards">
                    <img src="../images/brain.png" alt="Flashcards" class="menu-icon">
                    <span>Flashcards</span>
                </div>
            </a>

            <a href="../pages/libras.html">
                <div class="side-menu-item" data-page="libras">
                    <img src="../images/mao.png" alt="Libras" class="menu-icon">
                    <span>Libras</span>
                </div>
            </a>

        </div>

    </div>

    <div class="app-container">

        <div class="header">

            <h1 class="app-title"> JOVI Camera </h1>
            <p class="app-subtitle"> Experiência de câmera intuitiva + SnapTask para processamento inteligente </p>

        </div>

        <div class="phone-mockup">
            <div class="flashcards-page">
                <div class="flash-header">
                    <a href="./snaptask.html" class="header-icon-btn">
                        <img src="../images/retorno.png" class="header-icon">
                    </a>

                    <div class="title-area">
                        <h2>Flashcards IA</h2>
                        <span>3 cartões gerados a partir da foto capturada</span>
                    </div>

                    <button class="share-btn">

                        <img src="../images/compartilhar.png"
                        class="share-icon">

                    </button>

                </div>

                <div class="question-label"> PERGUNTA </div>

                <div class="card-container">

                    <div class="flash-card" id="flashCard">

                        <div class="card-front">

                            <p id="questionText"></p>

                        </div>

                        <div class="card-back">
                            <span class="answer-label"> RESPOSTA </span>
                            <p id="answerText"></p>
                        </div>

                        <span class="tap-info" id="tapInfo">Toque para ver resposta</span>

                    </div>

                </div>
                <div class="navigation">

                    <button class="nav-btn" id="prevBtn"> ‹</button>
                    <span class="counter" id="counter"> 1 / 3</span>
                    <button class="nav-btn" id="nextBtn"> › </button>

                </div>

                <button class="export-btn"> Exportar para Anki / Quizlet </button>

            </div>

        </div>

    </div>

    <script src="./flashcards.js"></script>

</body>
</html>
